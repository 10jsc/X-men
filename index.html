<!DOCTYPE html>
<html lang="pt-BR">
<!--ALT+shift+F identa o código-->

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="
        width=device-width, initial-scale=1.0" />
  <title>X-Men do zero ao programador
    contratado
  </title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;700&display=swap" rel="stylesheet" />

  <!--Para lincar sempre colocar ./ se a pasta estiver no projeto se estiver fora do projeto colocar ../-->
  <link rel="stylesheet" href="./SRC/CSS/reset.css">
  <link rel="stylesheet" href="./SRC/CSS/estilos.css">
  <link rel="stylesheet" href="./SRC/CSS/responsivo.css">


  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous"> -->

</head>
<!--1° tags/elemento, 2° classes/atributo e 3° valor do atributo, nessa ordem-->

<body>
  <!--ALT + L+O Abre a página no navegador-->
  <header class="cabecalho"><!--Usar Tag semântica que representa de fato não usar somente div-->
    <img class="logo" src="./SRC/imagens/logo.svg" alt="Logo x-men">
  </header>
  <main class="selecao-de-personagens">
    <section class="personagens">
      <h1 class="titulo"> Selecione um Mutante</h1>

      <!--Como se trata de uma lista usar ul lista desordenada
            ol seria lista ordenada seria ideal se fosse um ranque em ordem 
        o que não é o caso aqui-->
      <ul class="lista-de-personagens"><!--Lista desordenada-->
        <li class="personagem selecionado" id="ciclope" data-name="Ciclope"
          data-description="Ele tem o poder de disparar rajadas ópticas por um acidente que aconteceu com ele quando criança, mas não consegue controlá-los">
          <!--li Listar item do id-->
          <img src="./SRC/imagens/card-ciclope.jpg" alt="Personagem Ciclope" />
          <!--alt é o nome alternativo caso a imagem src não apareça. Ideal para deficiencia visual-->
        </li>
        <li class="personagem" id="jean-grey" data-name="Jean Grey"
          data-description="Jean Grey é uma mutante nível ômega e o principal avatar da Força Fênix, no qual manifesta poderes cósmicos. A telepatia e telecinese">
          <img src="./src/imagens/card-jean-grey.jpg" alt="Personagem Jean Grey" />
        </li>

        <li class="personagem" id="lince-negra" data-name="Lince Negra"
          data-description="Ela tem o poder de atravessar matéria sólida,campos de energia, rajadas ópticas, continuando intacta, e também tem o poder de andar no ar">
          <img src="./src/imagens/card-lince-negra.jpg" alt="Personagem Lince Negra" />
        </li>

        <li class="personagem" id="tempestade" data-name="Tempestade"
          data-description="Tem o poder de controlar as forças da natureza, muito poderosa ela pode produzir raios, chuvas, gelos, ventos, neblina, entre outros efeitos">
          <img src="./src/imagens/card-tempestade.jpg" alt="Personagem Tempestade" />
        </li>

        <li class="personagem" id="vampira" data-name="Vampira"
          data-description="Ela tem o poder de absorver a vitalidade e memória das pessoas que toca ou no caso dos mutantes os poderes e a memória, mas só temporariamente">
          <img src="./src/imagens/card-vampira.jpg" alt="Personagem Vampira" />
        </li>

        <li class="personagem" id="wolverine" data-name="Wolverine"
          data-description="Poderes. Garras Metálicas. Fator de Cura Regenerativo, Super Agilidade.">
          <img src="./src/imagens/card-wolverine.jpg" alt="Personagem Wolverine" />
        </li>

        <li class="personagem" id="noturno" data-name="Noturno"
          data-description="Ele é um mutante que nasceu com cauda, orelhas pontudas e com o poder de se Teletransportar">
          <img src="./src/imagens/card-noturno.jpg" alt="Personagem Noturno" />
        </li>

        <li class="personagem" id="magneto" data-name="Magneto"
          data-description="Ele tem o poder de magnetocinese, ou seja, controlar objetos de metal e criar campos magnéticos">
          <img src="./src/imagens/card-magneto.jpg" alt="Personagem Magneto" />
        </li>
      </ul>
    </section>
    <!--</section>-->
    <section class="personagem-selecionado">
      <img class="personagem-grande" src="./SRC/imagens/card-ciclope.png" alt="Personagem selecionado">
      <div class="informacoes-personagem">
        <h2 class="nome-personagem, section-divider background-color-rainbow" style="height: 4px;" id="nome-personagem">
          <strong style="font-size: 20px;">Ciclope</strong></h2>
        <div class="section-divider background-color-rainbow"></div>
        <P class="descricao-personagem" id="descricao-personagem">Ele tem o poder de disparar rajadas ópticas por um
          acidente que aconteceu com ele quando criança, mas não consegue controlá-los.</P>
      </div>
    </section>
  </main>
  <script src="./SRC/JS/index.js"></script>



</body>

</html>
